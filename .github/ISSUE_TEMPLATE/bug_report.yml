name: Bug report
description: Report unexpected CLI behavior or a defect
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Include enough detail that we can reproduce the problem.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Commands you ran, flags, template names, OS, Node/npm versions.
      placeholder: |
        1. …
        2. …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: patternfly-cli version
      description: Output of `patternfly-cli --version` or the npm package version.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or links if helpful.
    validations:
      required: false
